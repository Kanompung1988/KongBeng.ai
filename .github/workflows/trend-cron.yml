name: Generate Trend Article
on:
  schedule:
    # Every 6 hours at ICT 00:00, 06:00, 12:00, 18:00
    # ICT = UTC+7, so UTC times: 17:00, 23:00, 05:00, 11:00
    - cron: '3 17,23,5,11 * * *'
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate trend article
        run: |
          curl -s -X POST "${{ secrets.APP_URL }}/api/trend/generate" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 120
