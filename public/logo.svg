<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060d18"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="swoosh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Triangle frame -->
  <polygon points="100,28 170,158 30,158" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-opacity="0.25"/>

  <!-- K letter -->
  <g filter="url(#glow)">
    <text x="56" y="138" font-family="Georgia, serif" font-size="100" font-weight="bold" fill="url(#emerald)">K</text>
  </g>

  <!-- Candlestick bars -->
  <g filter="url(#glow)">
    <!-- Candle 1 (short) -->
    <line x1="118" y1="72" x2="118" y2="58" stroke="#10b981" stroke-width="1"/>
    <rect x="115" y="62" width="6" height="10" fill="#10b981" rx="1"/>
    <!-- Candle 2 (medium) -->
    <line x1="130" y1="68" x2="130" y2="50" stroke="#10b981" stroke-width="1"/>
    <rect x="127" y="54" width="6" height="14" fill="#10b981" rx="1"/>
    <!-- Candle 3 (tall) -->
    <line x1="142" y1="62" x2="142" y2="38" stroke="#10b981" stroke-width="1"/>
    <rect x="139" y="42" width="6" height="20" fill="#10b981" rx="1"/>
    <!-- Candle 4 (tallest) -->
    <line x1="154" y1="55" x2="154" y2="28" stroke="#34d399" stroke-width="1"/>
    <rect x="151" y="32" width="6" height="23" fill="#34d399" rx="1"/>
  </g>

  <!-- Upward arrow from candles -->
  <g filter="url(#glow)">
    <polyline points="160,30 166,24 166,32" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="154" y1="30" x2="166" y2="24" stroke="#34d399" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Swoosh arc -->
  <path d="M 45,120 Q 100,135 160,85" fill="none" stroke="url(#swoosh)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Sparkle dots -->
  <circle cx="48" cy="118" r="1.5" fill="#34d399" opacity="0.8"/>
  <circle cx="95" cy="125" r="1" fill="#10b981" opacity="0.6"/>
  <circle cx="155" cy="88" r="1.5" fill="#34d399" opacity="0.8"/>
</svg>
